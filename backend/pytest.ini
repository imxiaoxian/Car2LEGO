[pytest]
# Pytest configuration for Car2LEGO backend tests
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Use asyncio mode for async tests
asyncio_mode = auto

# Colored output + skip slow (real-API) tests by default
addopts = -v --tb=short --color=yes -m "not slow"

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests

# Coverage settings (run with pytest --cov)
[coverage:run]
source = app
omit =
    */tests/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
fail_under = 60
show_missing = True
skip_covered = False
