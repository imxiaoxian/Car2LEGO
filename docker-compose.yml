version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: car2lego
      POSTGRES_PASSWORD: car2lego
      POSTGRES_DB: car2lego
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U car2lego"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./storage:/app/storage
    environment:
      DATABASE_URL: postgresql+asyncpg://car2lego:car2lego@db:5432/car2lego
      REDIS_URL: redis://redis:6379/0
      STORAGE_PATH: /app/storage
      REBRICKABLE_API_KEY: ${REBRICKABLE_API_KEY:-}
      BRICKLINK_API_KEY: ${BRICKLINK_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
      - ./ai:/app/ai
      - ./storage:/app/storage
    environment:
      DATABASE_URL: postgresql+asyncpg://car2lego:car2lego@db:5432/car2lego
      REDIS_URL: redis://redis:6379/0
      STORAGE_PATH: /app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
    depends_on:
      - backend

volumes:
  pgdata:
